<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Teal/Green Gradients -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f0fdf4" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 8-Pointed Star Background with subtle shadow -->
  <polygon points="50,5 62,32 91,20 78,48 95,50 78,52 91,80 62,68 50,95 38,68 9,80 22,52 5,50 22,48 9,20 38,32" fill="url(#starGrad)" filter="url(#shadow)" />
  
  <!-- Sleek Handshake Icon in the Center -->
  <g fill="url(#handGrad)" stroke="#0d9488" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" transform="translate(26, 26) scale(0.48)">
    <!-- Left Hand / Arm -->
    <path d="M12 28 C15 22 25 18 32 24 L48 36 C52 39 52 45 47 48 L41 52 C37 55 31 53 28 49 Z" />
    <!-- Right Hand / Arm -->
    <path d="M88 28 C85 22 75 18 68 24 L52 36 C48 39 48 45 53 48 L59 52 C63 55 69 53 72 49 Z" />
    <!-- Intersecting clasp details (Handshake fingers) -->
    <path d="M42 32 C45 30 55 30 58 32 C61 34 61 38 58 40 C55 42 45 42 42 40 C39 38 39 34 42 32 Z" fill="#ffffff" />
    <line x1="45" y1="35" x2="55" y2="35" stroke="#0d9488" stroke-width="2" />
    <line x1="45" y1="38" x2="55" y2="38" stroke="#0d9488" stroke-width="2" />
    <line x1="45" y1="41" x2="55" y2="41" stroke="#0d9488" stroke-width="2" />
  </g>
</svg>
